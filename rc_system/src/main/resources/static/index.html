<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang nhap</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 20px;
      text-align: center;
    }
    a { color: var(--primary); text-decoration: none; }
    .muted { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Dang chuyen toi trang dang nhap...</h2>
    <div class="muted">Neu khong tu dong chuyen, bam <a href="login.html">vao day</a>.</div>
  </div>

  <script>
    const sessionRaw = localStorage.getItem('session');
    if (sessionRaw) {
      window.location.replace('app.html');
    } else {
      window.location.replace('login.html');
    }
  </script>
</body>
</html>
