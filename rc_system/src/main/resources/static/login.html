<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    h2 { margin: 0 0 12px 0; }
    .muted { color: var(--muted); font-size: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
    input, select, button {
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      background: #fff;
    }
    button {
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      border: 0;
      transition: background 0.2s ease;
      margin-top: 12px;
    }
    button:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); }
    .btn-success:hover { background: #15803d; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    .actions button { width: auto; flex: 1; }
    a { color: var(--primary); text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Đăng nhập</h2>
    <div class="muted">Đăng nhập để vào DashBoard</div>

    <label>UserName</label>
    <input id="loginUserName" placeholder="Nguyen Van A" />

    <label>Mat khau</label>
    <input id="loginPassword" type="password" placeholder="Nhập mật khẩu" />

    <button class="btn-success" onclick="login()">Đăng nhập</button>
    <div class="actions">
      <button onclick="goRegister()">Đăng ký</button>
<!--      <button onclick="goDashboard()">Vào thẳng Dashboard</button>-->
    </div>

    <div id="loginMsg" class="muted" style="margin-top: 8px;"></div>
  </div>

  <script>
    function setSession(userId, role) {
      localStorage.setItem('session', JSON.stringify({ userId, role }));
    }

    function baseUrl() {
      return window.location.origin;
    }

    function login() {
      const userName = document.getElementById('loginUserName').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!userName || !password) {
        document.getElementById('loginMsg').textContent = 'Vui lòng nhập UserName và mật  khẩu';
        return;
      }
      fetch(`${baseUrl()}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userName, password })
      })
        .then(res => res.json().then(data => ({ ok: res.ok, data })))
        .then(({ ok, data }) => {
          if (!ok) {
            document.getElementById('loginMsg').textContent = data.message || 'Đăng nhập thất bại';
            return;
          }
          setSession(data.userId, data.role || 'user');
          window.location.href = 'app.html';
        })
        .catch(err => {
          document.getElementById('loginMsg').textContent = err.message;
        });
    }

    function goRegister() {
      window.location.href = 'register.html';
    }

    function goDashboard() {
      window.location.href = 'app.html';
    }
  </script>
</body>
</html>
