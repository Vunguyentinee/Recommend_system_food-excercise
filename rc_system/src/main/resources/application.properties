spring.application.name=rc_system

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GoodHealthSystem;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# AI recommendation service
ai.recommendation.base-url=http://localhost:8001
ai.recommendation.endpoints.user-based=/api/ai/recommend/user
ai.recommendation.endpoints.item-based=/api/ai/recommend/item
ai.recommendation.endpoints.hybrid=/api/ai/recommend/hybrid
ai.recommendation.endpoints.top-rated=/api/ai/recommend/top-rated
ai.recommendation.connect-timeout-ms=2000
ai.recommendation.read-timeout-ms=5000